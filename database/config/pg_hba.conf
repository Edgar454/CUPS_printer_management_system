# ===============================================================
# pg_hba.conf - Strict Access
# ===============================================================

# Local admin access
local   all   postgres         peer
local   all   all              md5

# Docker subnet - require password
host    all   all   172.28.0.0/24   md5

# Reject everything else
host    all   all   0.0.0.0/0       reject
host    all   all   ::/0            reject