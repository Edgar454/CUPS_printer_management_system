services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel_collector
    volumes:
      - ./observability/otel-collector.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"   
      - "4318:4318"   
    networks:
      - cups_network

  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./observability/tempo.yaml:/etc/tempo.yaml
      - tempo_data:/var/tempo
    networks:
      - cups_network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - cups_network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres_exporter
    environment:
      DATA_SOURCE_NAME: postgresql://postgres_exporter:${POSTGRES_EXPORTER_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    networks:
      - cups_network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      POSTGRES_USER: ${POSTGRES_GRAFANA_USER:-grafana_user}
      POSTGRES_PASSWORD: ${POSTGRES_GRAFANA_PASSWORD:-grafana_user_password}
      POSTGRES_DB: ${POSTGRES_GRAFANA_DB:-postgres}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - cups_network

volumes:
  tempo_data:
  grafana_data:
  prometheus_data:
