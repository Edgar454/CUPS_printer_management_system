name: Push code to the VM

on:
  push:
    branches:
      - "main"
      - "master"
    paths:
      - 'api/**'
      - 'processing_pipeline/**'
      - 'printer-platform-ui/**'
      - 'cups_server/**'
      - 'database/**'
      - 'dummy_printer/**'
      - 'observability/**'
      - 'docker-compose*.yml'
      - 'Makefile'

env:
  VM_REPO_WORK_FOLDER: ${{ secrets.VM_REPO_WORK_FOLDER }}
  VM_USERNAME: ${{ secrets.VM_USERNAME }}
  VM_PUBLIC_IP: ${{ secrets.VM_PUBLIC_IP }}
  VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
  CONTAINER_REPO_USERNAME: ${{ secrets.CONTAINER_REPO_USERNAME }}
  CONTAINER_REPO_ACCESS_TOKEN: ${{ secrets.CONTAINER_REPO_ACCESS_TOKEN }}

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        run: |
          export GITHUB_TOKEN=$CONTAINER_REPO_ACCESS_TOKEN
          export GITHUB_ACTOR=$CONTAINER_REPO_USERNAME
          make login

      - name: Build and Push Images
        run: |
          make build
          make push

  deploy:
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VM_SSH_KEY }}

      - name: Add VM to known hosts
        run: ssh-keyscan -H $VM_PUBLIC_IP >> ~/.ssh/known_hosts

      - name: Test VM connection
        run: ssh $VM_USERNAME@$VM_PUBLIC_IP "echo 'VM reachable ✅'"

      - name: Prepare VM folder
        run: ssh $VM_USERNAME@$VM_PUBLIC_IP "rm -rf $VM_REPO_WORK_FOLDER && mkdir -p $VM_REPO_WORK_FOLDER"

      - name: Copy required files
        run: |
          scp docker-compose.yaml $VM_USERNAME@$VM_PUBLIC_IP:$VM_REPO_WORK_FOLDER/
          scp docker-compose.observability.yml $VM_USERNAME@$VM_PUBLIC_IP:$VM_REPO_WORK_FOLDER/
          scp Makefile $VM_USERNAME@$VM_PUBLIC_IP:$VM_REPO_WORK_FOLDER/
          scp .env.example $VM_USERNAME@$VM_PUBLIC_IP:$VM_REPO_WORK_FOLDER/.env
          scp -r permissions $VM_USERNAME@$VM_PUBLIC_IP:$VM_REPO_WORK_FOLDER/

      - name: Log in to Container Registry on VM
        run: |
          ssh $VM_USERNAME@$VM_PUBLIC_IP \
            "echo $CONTAINER_REPO_ACCESS_TOKEN | docker login ghcr.io -u $CONTAINER_REPO_USERNAME --password-stdin"


      - name: Deploy stack on VM
        run: ssh $VM_USERNAME@$VM_PUBLIC_IP "cd $VM_REPO_WORK_FOLDER && make run && echo 'Stack deployed ✅'"